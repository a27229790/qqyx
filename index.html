<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>禮包碼提交器</title>
</head>
<body>
    <textarea id="codes" placeholder="一行一個..."></textarea>
    <button onclick="send()">提交</button>

    <script>
        function send() {
            const text = document.getElementById('codes').value;
            const lines = text.split('\n').map(s => s.trim()).filter(s => s !== "");
            if (lines.length === 0) return;

            const joined = lines.join('@==');
            // 你的伺服器地址
            const url = `http://47.96.230.2:9997/qqyxNew/addDHM?dhm=${encodeURIComponent(joined)}`;
            
            // 使用 window.open 避開混合內容限制
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
