<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>禮包碼工具</title>
    <style>
        /* 全域設定 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            padding: 15px; 
            background: #f4f7f9; 
            display: flex; 
            justify-content: center; 
            margin: 0;
        }
        
        .box { 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            width: 100%; 
            max-width: 450px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            box-sizing: border-box; /* 確保 padding 不會撐破版面 */
        }

        h3 { margin-top: 0; color: #333; text-align: center; }

        textarea { 
            width: 100%; 
            height: 250px; /* 手機上高度拉長一點比較好輸入 */
            margin: 10px 0; 
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-family: monospace; 
            font-size: 16px; /* 防止 iOS 輸入時自動縮放 */
        }

        button { 
            width: 100%; 
            padding: 18px; /* 加大觸控區域 */
            background: #28a745; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 18px; /* 字體放大更好點 */
            font-weight: bold;
            -webkit-tap-highlight-color: transparent; /* 去除點擊時的藍色陰影 */
        }

        button:active { background: #218838; }

        .footer { font-size: 12px; color: #888; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="box">
    <h3>禮包碼保存紀錄</h3>
    <textarea id="codes" placeholder="輸入禮包碼，一行一個..." inputmode="latin"></textarea>
    <button onclick="submit()">提交並更新紀錄</button>
    <p class="footer">※ 紀錄儲存在瀏覽器中</p>
</div>

<script>
    const STORAGE_KEY = 'saved_gift_codes';

    window.onload = function() {
        const savedCodes = localStorage.getItem(STORAGE_KEY);
        if (savedCodes) {
            document.getElementById('codes').value = savedCodes;
        }
    };

    function submit() {
        const text = document.getElementById('codes').value;
        localStorage.setItem(STORAGE_KEY, text);
        
        const lines = text.split('\n').map(s => s.trim()).filter(s => s !== "");
        if (lines.length === 0) return alert("請輸入禮包碼");

        const joined = lines.join('@==');
        const url = `http://47.96.230.2:9997/qqyxNew/addDHM?dhm=${encodeURIComponent(joined)}`;
        
        window.open(url, '_blank');
    }
</script>

</body>
</html>
