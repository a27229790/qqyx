<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禮包碼批量提交工具</title>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #ffffff; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #333; margin-top: 0; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #555; }
        textarea { width: 100%; height: 150px; border: 2px solid #ddd; border-radius: 8px; padding: 12px; box-sizing: border-box; font-family: monospace; transition: border-color 0.3s; resize: none; }
        textarea:focus { border-color: #007bff; outline: none; }
        .btn-group { margin-top: 20px; display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: opacity 0.3s; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-secondary { background-color: #6c757d; color: white; }
        button:hover { opacity: 0.9; }
        #result { margin-top: 20px; display: none; background: #f1f3f5; padding: 15px; border-radius: 8px; word-break: break-all; border-left: 5px solid #007bff; }
        .url-text { font-size: 13px; color: #007bff; text-decoration: underline; cursor: pointer; }
        .status-tag { display: inline-block; margin-top: 10px; font-size: 12px; padding: 2px 8px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="card">
    <h2>禮包碼提交系統</h2>
    <label>輸入禮包碼（一行一個）</label>
    <textarea id="inputCodes" placeholder="CODE123&#10;GIFT456"></textarea>
    
    <div class="btn-group">
        <button class="btn-primary" onclick="process(true)">自動提交</button>
        <button class="btn-secondary" onclick="process(false)">僅生成網址</button>
    </div>

    <div id="result">
        <strong>生成的接口網址：</strong><br>
        <div id="urlContainer" class="url-text" onclick="openLink()"></div>
        <div id="statusTag" class="status-tag"></div>
    </div>
</div>

<script>
    let currentUrl = "";

    function process(autoSubmit) {
        const text = document.getElementById('inputCodes').value;
        const codes = text.split('\n').map(s => s.trim()).filter(s => s !== "");
        
        if (codes.length === 0) {
            alert("請先輸入禮包碼");
            return;
        }

        // 拼接格式：dhm=碼1@==碼2
        const joined = codes.join('@==');
        currentUrl = `http://47.96.230.2:9997/qqyxNew/addDHM?dhm=${encodeURIComponent(joined)}`;

        // 顯示結果區域
        document.getElementById('result').style.display = "block";
        document.getElementById('urlContainer').innerText = currentUrl;
        
        const statusTag = document.getElementById('statusTag');
        
        if (autoSubmit) {
            statusTag.innerText = "嘗試發送請求中...";
            statusTag.style.backgroundColor = "#ffeeba";
            
            // 使用 no-cors 模式嘗試發送（解決部分跨域問題，但看不到回傳內容）
            fetch(currentUrl, { mode: 'no-cors' })
                .then(() => {
                    statusTag.innerText = "請求已發出 (請檢查腳本是否生效)";
                    statusTag.style.backgroundColor = "#d4edda";
                })
                .catch(err => {
                    statusTag.innerText = "發送失敗，請點擊上方網址手動打開";
                    statusTag.style.backgroundColor = "#f8d7da";
                });
        } else {
            statusTag.innerText = "網址已生成，可點擊上方連結打開";
            statusTag.style.backgroundColor = "#e2e3e5";
        }
    }

    function openLink() {
        if (currentUrl) window.open(currentUrl, '_blank');
    }
</script>

</body>
</html>
