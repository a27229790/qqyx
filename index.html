<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>球球英雄腳本工具站</title>
    <style>
        /* 預設為深色風格 (符合你的需求) */
        :root {
            --bg-color: #121212;
            --text-color: #e0e0e0;
            --btn-bg: #ffffff;
            --btn-text: #121212;
        }

        /* 淺色模式類別 */
        body.light-mode {
            --bg-color: #ffffff;
            --text-color: #333333;
            --btn-bg: #333333;
            --btn-text: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.3s ease, color 0.3s ease;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 { margin-bottom: 10px; font-size: 24px; }
        p { margin-bottom: 30px; opacity: 0.8; }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 300px;
        }

        .btn {
            padding: 15px;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            transition: transform 0.1s, background-color 0.3s, color 0.3s;
        }

        .btn:active { transform: scale(0.98); }

        #theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: 1px solid var(--text-color);
            color: var(--text-color);
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            transition: all 0.3s;
        }
    </style>
</head>
<body>

    <button id="theme-toggle" onclick="toggleTheme()">切換淺色模式</button>

    <h1>球球英雄腳本工具站</h1>
    <p>所有工具皆只適用安卓與電腦</p>
    
    <div class="btn-group">
        <a href="https://4v2dwd4peo.k.topthink.com/@qqyx/shipeideheqiutaozhuang.html" target="_blank" class="btn">適配球球套裝</a>
        <a href="https://mega.nz/folder/kBc2zIwT#u4nl-K4ne_LWKfCF8UvJjw" target="_blank" class="btn">手機虛擬機下載</a>
        <a href="http://47.96.230.2:5147/qqyx/downloadScript.html" target="_blank" class="btn">腳本下載</a>
        <a href="https://mega.nz/folder/oJcniTzb#2q8jn1u5yTBOgX-cZ5fDcg" target="_blank" class="btn">免廣告/全皮膚下載</a>
        <a href="https://epyz.qzz.io/view.php/b6f2f5119157f38cb5a54fef3190814d.mp4" target="_blank" class="btn">免廣告/全皮膚安卓教學</a>
    </div>

    <script>
        const btn = document.getElementById('theme-toggle');
        const body = document.body;

        function toggleTheme() {
            body.classList.toggle('light-mode');
            
            // 儲存設定到瀏覽器
            const isLight = body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            
            // 更新按鈕文字
            btn.textContent = isLight ? "切換深色模式" : "切換淺色模式";
        }

        // 初始化：頁面載入時檢查設定
        window.onload = () => {
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

            // 如果有存過設定就用設定，沒有的話就跟隨系統
            if (savedTheme === 'light' || (!savedTheme && !systemPrefersDark)) {
                body.classList.add('light-mode');
                btn.textContent = "切換深色模式";
            }
        };
    </script>
</body>
</html>
