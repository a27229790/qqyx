<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禮包碼批量提交工具</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 20px; background-color: #f4f7f9; display: flex; justify-content: center; }
        .box { background: white; padding: 25px; border-radius: 12px; width: 100%; max-width: 450px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h3 { margin-top: 0; color: #333; text-align: center; }
        textarea { width: 100%; height: 200px; margin: 15px 0; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: monospace; font-size: 14px; resize: none; }
        textarea:focus { border-color: #007bff; outline: none; }
        button { width: 100%; padding: 15px; background-color: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background 0.2s; }
        button:hover { background-color: #218838; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .footer { font-size: 12px; color: #888; margin-top: 15px; text-align: center; line-height: 1.5; }
    </style>
</head>
<body>

<div class="box">
    <h3>禮包碼批量提交</h3>
    <textarea id="codes" placeholder="請輸入禮包碼，一行一個..."></textarea>
    <button id="submitBtn" onclick="submitCodes()">提交並儲存</button>
    <p class="footer">※ 紀錄自動儲存在瀏覽器。<br>※ 提交後會於背景進行請求，不需跳轉頁面。</p>
</div>

<script>
    const STORAGE_KEY = 'saved_gift_codes';
    const btn = document.getElementById('submitBtn');

    // 頁面載入時讀取紀錄
    window.onload = () => {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) document.getElementById('codes').value = saved;
    };

    async function submitCodes() {
        const textarea = document.getElementById('codes');
        const text = textarea.value.trim();
        
        if (!text) return alert("請輸入禮包碼");

        // 儲存紀錄
        localStorage.setItem(STORAGE_KEY, text);

        // 處理拼接
        const lines = text.split('\n').map(s => s.trim()).filter(s => s !== "");
        const joined = lines.join('@==');
        const url = `http://47.96.230.2:9997/qqyxNew/addDHM?dhm=${encodeURIComponent(joined)}`;

        // 更新按鈕狀態
        btn.disabled = true;
        btn.innerText = "提交中...";

        try {
            // 背景發送請求
            const response = await fetch(url);
            
            if (response.ok) {
                alert("✅ 提交成功！");
            } else {
                alert("⚠️ 伺服器回應錯誤狀態：" + response.status);
            }
        } catch (error) {
            console.error("發送失敗:", error);
            alert("❌ 發送失敗，可能是網路連線問題。");
        } finally {
            btn.disabled = false;
            btn.innerText = "提交並儲存";
        }
    }
</script>

</body>
</html>
