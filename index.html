<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>禮包碼工具</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f7f9; display: flex; justify-content: center; }
        .box { background: white; padding: 25px; border-radius: 12px; width: 100%; max-width: 450px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 180px; margin: 10px 0; padding: 10px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: monospace; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .footer { font-size: 12px; color: #888; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="box">
    <h3>禮包碼保存紀錄</h3>
    <textarea id="codes" placeholder="輸入禮包碼，一行一個..."></textarea>
    <button onclick="submit()">提交並更新本地紀錄</button>
    <p class="footer">※ 紀錄會保存在此瀏覽器中，不會公開給他人。</p>
</div>

<script>
    const STORAGE_KEY = 'saved_gift_codes';

    // 1. 網頁開啟時，自動讀取上次輸入的內容
    window.onload = function() {
        const savedCodes = localStorage.getItem(STORAGE_KEY);
        if (savedCodes) {
            document.getElementById('codes').value = savedCodes;
        }
    };

    function submit() {
        const text = document.getElementById('codes').value;
        
        // 2. 每次提交時，自動將內容儲存到 localStorage
        localStorage.setItem(STORAGE_KEY, text);
        
        const lines = text.split('\n').map(s => s.trim()).filter(s => s !== "");
        if (lines.length === 0) return alert("請輸入禮包碼");

        const joined = lines.join('@==');
        const url = `http://47.96.230.2:9997/qqyxNew/addDHM?dhm=${encodeURIComponent(joined)}`;
        
        window.open(url, '_blank');
    }
</script>

</body>
</html>
